<style>
:root{--bg:#080d0a;--bg2:#0d1410;--border:#253d2a;--accent:#3a7d44;--accent3:#6bbf78;--text:#c8d8c0;--text3:#526650;--mono:'Share Tech Mono',monospace;--head:'Barlow Condensed',sans-serif}

.eyecon{margin-bottom:32px;opacity:0.4}
.code{font-family:var(--head);font-weight:900;font-size:5rem;color:#fff;letter-spacing:0.1em;line-height:1}
.code span{color:var(--accent3);font-weight:300}
.msg{font-family:var(--mono);font-size:0.7rem;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin:16px 0 32px}
.home-btn{font-family:var(--mono);font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;background:var(--accent);color:#fff;border:none;padding:12px 28px;cursor:pointer;text-decoration:none;display:inline-block;transition:background 0.15s}
.home-btn:hover{background:var(--accent3);color:#000}
.footer{margin-top:48px;font-family:var(--mono);font-size:0.55rem;color:var(--text3);letter-spacing:0.08em}
